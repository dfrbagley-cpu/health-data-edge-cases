name: Report a bug
description: Report a reproducible problem in the suite or documentation.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
      description: Include the command and complete non-sensitive output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system and Python or R version.
  - type: checkboxes
    id: privacy
    attributes:
      label: Data safety
      options:
        - label: This report contains no patient, employer, customer, or other sensitive data.
          required: true
