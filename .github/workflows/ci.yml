name: Conformance suite

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-reference:
    name: Python ${{ matrix.python-version }} and portable SQL
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned DuckDB reference
        run: python -m pip install duckdb==1.5.5
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run conformance suite
        run: python scripts/run_suite.py
      - name: Run portable SQL in DuckDB
        run: python scripts/run_duckdb.py
      - name: Verify committed report
        run: python scripts/build_report.py --check

  installed-wheel:
    name: Installed wheel smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install build==1.5.0
          python -m build
      - name: Install and run outside the source tree
        run: |
          python -m venv "$RUNNER_TEMP/wheel-smoke"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m pip install duckdb==1.5.5 dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/wheel-smoke/bin/health-data-edge-cases"
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m health_edge_cases --json > wheel-result.json
          "$RUNNER_TEMP/wheel-smoke/bin/python" -m health_edge_cases.duckdb_runner

  r-reference:
    name: Base R reference
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          use-public-rspm: true
      - name: Run independent R reference
        run: Rscript R/run_suite.R
